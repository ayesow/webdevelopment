<article class="card">
    <div class="media">
      <img class="main" [src]="selectedImage()" [alt]="product().name" />
  
      <div class="thumbs">
        @for (img of product().images; track img) {
          <button class="thumb" type="button" (click)="setImage(img)">
            <img [src]="img" [alt]="product().name" />
          </button>
        }
      </div>
    </div>
  
    <h3 class="title">{{ product().name }}</h3>
    <p class="desc">{{ product().description }}</p>
  
    <div class="meta">
      <div class="price">{{ product().price }} ₸</div>
  
      <div class="rating">
        <span class="stars">
          @for (s of stars(); track s) {
            <span class="star" [class.filled]="filled(s)">★</span>
          }
        </span>
        <span class="num">{{ product().rating }}</span>
      </div>
    </div>
  
    <div class="actions">
      <a class="link" [href]="product().link" target="_blank" rel="noopener noreferrer">
        View on Kaspi
      </a>
  
      <div class="share">
        <button type="button" (click)="shareWhatsApp()">WhatsApp</button>
        <button type="button" (click)="shareTelegram()">Telegram</button>
      </div>
    </div>
  </article>
